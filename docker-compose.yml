services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-compass}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d ${POSTGRES_DB:-compass}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  vault:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command:
      [
        "vault",
        "server",
        "-dev",
        "-dev-listen-address=0.0.0.0:8200",
        "-dev-root-token-id=${VAULT_TOKEN:-dev-only-root-token}",
      ]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-dev-only-root-token}
      VAULT_ADDR: http://127.0.0.1:8200
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "VAULT_ADDR=http://127.0.0.1:8200 vault status >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "8200:8200"

  # Vault dev mode stores secrets in memory, so they are lost whenever the vault container
  # is recreated. This init job re-seeds them on every `up` from .env, making secrets durable
  # across recreates (as long as OPENAI_API_KEY is set in .env). Runs once and exits.
  vault-init:
    image: hashicorp/vault:1.18
    restart: "no"
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-only-root-token}
      VAULT_MOUNT: ${VAULT_MOUNT:-secret}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-compass}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      COMPASS_APP_PASSWORD: ${COMPASS_APP_PASSWORD:-compass_app_password}
      COMPASS_WRITER_PASSWORD: ${COMPASS_WRITER_PASSWORD:-compass_writer_password}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-jwt-signing-key-change-me}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-compass-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-compass-minio-secret}
    entrypoint:
      - sh
      - -lc
      - |
        set -e
        export VAULT_TOKEN="$${VAULT_TOKEN}"
        # Preserve an existing OpenAI key if .env doesn't provide one (avoid clobbering with blank).
        if [ -z "$${OPENAI_API_KEY}" ]; then
          OPENAI_API_KEY="$$(vault kv get -mount=$${VAULT_MOUNT} -field=openai_api_key $${VAULT_SECRET_PATH} 2>/dev/null || echo PLACEHOLDER_REPLACE_ME)"
        fi
        vault kv put -mount=$${VAULT_MOUNT} $${VAULT_SECRET_PATH} \
          openai_api_key="$${OPENAI_API_KEY}" \
          postgres_password="$${POSTGRES_PASSWORD}" \
          compass_app_password="$${COMPASS_APP_PASSWORD}" \
          compass_writer_password="$${COMPASS_WRITER_PASSWORD}" \
          jwt_signing_key="$${JWT_SIGNING_KEY}" \
          s3_access_key="$${MINIO_ROOT_USER}" \
          s3_secret_key="$${MINIO_ROOT_PASSWORD}"
        echo "vault-init: seeded $${VAULT_MOUNT}/$${VAULT_SECRET_PATH}"

  # Long-running watcher that re-seeds Vault whenever the dev container restarts and loses its
  # in-memory KV data. This makes secrets recover automatically on `docker compose restart vault`
  # and ordinary container restarts, not just on `docker compose up`.
  vault-sync:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-only-root-token}
      VAULT_MOUNT: ${VAULT_MOUNT:-secret}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-compass}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      COMPASS_APP_PASSWORD: ${COMPASS_APP_PASSWORD:-compass_app_password}
      COMPASS_WRITER_PASSWORD: ${COMPASS_WRITER_PASSWORD:-compass_writer_password}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-jwt-signing-key-change-me}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-compass-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-compass-minio-secret}
    entrypoint:
      - sh
      - -lc
      - |
        set -e
        export VAULT_TOKEN="$${VAULT_TOKEN}"
        while true; do
          if [ -n "$${OPENAI_API_KEY}" ] && ! vault kv get -mount="$${VAULT_MOUNT}" "$${VAULT_SECRET_PATH}" >/dev/null 2>&1; then
            vault kv put -mount="$${VAULT_MOUNT}" "$${VAULT_SECRET_PATH}" \
              openai_api_key="$${OPENAI_API_KEY}" \
              postgres_password="$${POSTGRES_PASSWORD}" \
              compass_app_password="$${COMPASS_APP_PASSWORD}" \
              compass_writer_password="$${COMPASS_WRITER_PASSWORD}" \
              jwt_signing_key="$${JWT_SIGNING_KEY}" \
              s3_access_key="$${MINIO_ROOT_USER}" \
              s3_secret_key="$${MINIO_ROOT_PASSWORD}"
            echo "vault-sync: re-seeded $${VAULT_MOUNT}/$${VAULT_SECRET_PATH}"
          fi
          sleep 5
        done

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-compass-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-compass-minio-secret}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "backend.app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "backend",
        "--reload-dir",
        "frontend",
        "--reload-dir",
        "ingestion",
        "--reload-dir",
        "worker",
        "--reload-dir",
        "data",
        "--reload-exclude",
        ".venv/*",
        "--reload-exclude",
        "model-cache/*",
      ]
    env_file:
      - .env
    environment:
      HF_HOME: /models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - model-cache:/models

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: ["python", "-m", "worker.worker"]
    env_file:
      - .env
    environment:
      HF_HOME: /models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from worker.worker import worker_healthcheck; worker_healthcheck()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - .:/app
      - model-cache:/models

volumes:
  postgres-data:
  minio-data:
  model-cache:
